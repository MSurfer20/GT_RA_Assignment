version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/data/app.db

  worker:
    build: .
    command: celery -A backend.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/data/app.db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
