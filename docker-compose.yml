version: '3.8'

services:
  # The main FastAPI web server
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./frontend:/app/frontend
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/data/app.db

  # Background task worker using Celery
  worker:
    build: .
    command: celery -A backend.celery_app.app worker --loglevel=info
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    depends_on:
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/data/app.db

  # Redis acts as the message broker between FastAPI and Celery
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
